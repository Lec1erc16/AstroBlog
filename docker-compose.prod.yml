services:
  blog:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: blog-app
    restart: unless-stopped
    expose:
      - "80"
    environment:
      SITE_URL: ${SITE_URL}
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - edge

networks:
  edge:
    external: true
    name: aliyun-edge
